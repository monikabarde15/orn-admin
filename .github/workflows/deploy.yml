name: Deploy (Dev & Prod)

on:
    push:
        branches:
            - dev
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            # Detect environment (dev or prod)
            - name: Set environment
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
                    echo "ENV=dev" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_DEV }}" >> $GITHUB_ENV
                  else
                    echo "ENV=prod" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_PROD }}" >> $GITHUB_ENV
                  fi

            # Cache node_modules + Docker build cache
            - name: Cache dependencies & build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      /tmp/.buildx-cache
                  key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # Build image and export as tar (no registry!)
            - name: Build & export Docker image
              run: |
                  docker buildx create --use
                  docker buildx build \
                    --cache-from=type=local,src=/tmp/.buildx-cache \
                    --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
                    --tag onrequestlab_reactjs:${{ env.ENV }} \
                    --output type=docker,dest=app.tar \
                    .

            # Transfer image + docker-compose file
            - name: Transfer image, Dockerfile and docker-compose.yml file to server
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sudo apt-get update && sudo apt-get install -y sshpass

                  # Transfer built image, Dockerfile & docker-compose.yml
                  sshpass -p "$HOST_PASSWORD" scp -o StrictHostKeyChecking=no app.tar Dockerfile docker-compose.yml "${{ secrets.HOST_USER }}"@${{ env.HOST }}:~/onrequestlab_reactjs/

            # Load image and restart containers
            - name: Load image & restart on server
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sshpass -p "$HOST_PASSWORD" ssh -o StrictHostKeyChecking=no \
                    "${{ secrets.HOST_USER }}"@${{ env.HOST }} << 'EOF'
                    set -e
                    cd ~/onrequestlab_reactjs

                    echo "Loading new image..."
                    docker load < onrequestlab_reactjs.tar

                    echo "Restarting containers..."
                    docker compose down || true
                    docker compose up -d --remove-orphans

                    rm -f onrequestlab_reactjs.tar
                    echo "Deployed ${{ env.ENV }} successfully!"
                  EOF

            # Success message
            - name: Deploy Success
              if: success()
              run: |
                  echo "Deployed ${{ env.ENV }} environment"
                  echo "App is live at: http://${{ env.HOST }}:3000"
