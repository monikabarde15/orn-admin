name: Deploy To Production

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Known Hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.HOST_SERVER }} >> ~/.ssh/known_hosts

            - name: SSH into EC2 and clone repo
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sudo apt-get update
                  sudo apt-get install -y sshpass
                  sshpass -p "$HOST_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.HOST_USER }}"@"${{ secrets.HOST_SERVER }}" << 'EOF'
                    set -e

                    sudo rm -rf ~/onrequestlab_reactjs
                    git clone https://${{ secrets.PAT_TOKEN }}@github.com/onrequestlab/Onrequestreactjs.git ~/onrequestlab_reactjs
                    cd ~/onrequestlab_reactjs

                    git fetch origin main
                    git checkout main || git checkout -b main origin/main

                    # Preserve newlines in .env
                    printf "%s\n" "${{ secrets.ENV_FILE }}" > .env

                    sudo docker compose down
                    sudo docker system prune -af
                    sudo docker compose up -d --build
                  EOF

            - name: Deployment Summary
              if: success()
              run: |
                  echo "🎉 Deployment Summary:"
                  echo "✅ Successfully deployed with Docker Compose"
                  echo "🔗 Django Application: http://localhost:3000"
                  echo "🐳 Compose project: $COMPOSE_PROJECT_NAME"
                  echo "📊 Services: web"

            - name: Notify on failure
              if: failure()
              run: |
                  echo "❌ Deployment failed!"
                  echo "Please check the logs above for details."
                  echo "The previous version should still be running if rollback was successful."
