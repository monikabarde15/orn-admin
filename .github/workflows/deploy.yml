# .github/workflows/deploy.yml
name: Deploy (Dev & Prod)

on:
    push:
        branches:
            - dev
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            # Set dev or prod
            - name: Set environment
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
                    echo "ENV=dev" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_DEV }}" >> $GITHUB_ENV
                  else
                    echo "ENV=prod" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_PROD }}" >> $GITHUB_ENV
                  fi

            - name: Setup SSH Key
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.HOST_SERVER_KEY_PAIR }}" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa
                ssh-keyscan -H "${{ env.HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

            # Cache = speed
            - name: Cache node_modules + Docker layers
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      /tmp/.buildx-cache
                  key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
                  restore-keys: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & export image
              run: |
                  docker buildx create --use
                  docker buildx build \
                    --cache-from=type=local,src=/tmp/.buildx-cache \
                    --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
                    --tag onrequestlab_reactjs:${{ env.ENV }} \
                    --output type=docker,dest=app.tar \
                    .

            - name: Transfer image
              run: |
                  scp app.tar root@${{ env.HOST }}:~/onrequestlab_reactjs.tar

            # Restart on server
            - name: Load image & restart
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  ssh root@${{ env.HOST }} << 'EOF'
                    set -e

                    echo "Loading new Docker image..."
                    docker load -i onrequestlab_reactjs.tar

                    echo "Restarting containers..."
                    docker rm -f onrequestlab_reactjs
                    docker run -d -p 3000:3000 --name onrequestlab_reactjs onrequestlab_reactjs:${{ env.ENV }}  
                    
                    rm -f onrequestlab_reactjs.tar
                    echo "Deployed ${{ env.ENV }} successfully!"
                  EOF

            - name: Success
              if: success()
              run: |
                  echo "Deployed ${{ env.ENV }} environment"
                  echo "App running at → http://${{ env.HOST }}:3000"
