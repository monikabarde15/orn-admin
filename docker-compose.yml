services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: react_app
        command: >
            sh -c "
                npm install &&
                npm install -g serve &&
                npm run build &&
                serve dist -s -l 3000
            "
        ports:
            - '3000:3000'
        volumes:
            - .:/app
        env_file:
            - .env
