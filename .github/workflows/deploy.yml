# .github/workflows/deploy.yml
name: Deploy (Dev & Prod)

on:
    push:
        branches:
            - dev
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            # Set dev or prod
            - name: Set environment
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
                    echo "ENV=dev" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_DEV }}" >> $GITHUB_ENV
                  else
                    echo "ENV=prod" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.HOST_SERVER_PROD }}" >> $GITHUB_ENV
                  fi

            # Cache = speed
            - name: Cache node_modules + Docker layers
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      /tmp/.buildx-cache
                  key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
                  restore-keys: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & export image
              run: |
                  docker buildx create --use
                  docker buildx build \
                    --build-arg APP_DIR=app \
                    --cache-from=type=local,src=/tmp/.buildx-cache \
                    --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
                    --tag onrequestlab_reactjs:${{ env.ENV }} \
                    --output type=docker,dest=app.tar \
                    .

            - name: Transfer app.tar + Dockerfile + docker-compose.yml
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sudo apt-get update && sudo apt-get install -y sshpass

                  sshpass -p "$HOST_PASSWORD" scp -o StrictHostKeyChecking=no \
                    app.tar Dockerfile docker-compose.yml \
                    "${{ secrets.HOST_USER }}"@${{ env.HOST }}:~/onrequestlab_reactjs/

            # Restart on server
            - name: Load image & restart
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sshpass -p "$HOST_PASSWORD" ssh -o StrictHostKeyChecking=no \
                    "${{ secrets.HOST_USER }}"@${{ env.HOST }} << 'EOF'
                    set -e
                    cd ~/onrequestlab_reactjs

                    echo "Loading new Docker image..."
                    docker load < app.tar

                    echo "Restarting containers..."
                    docker compose down || true
                    docker compose up -d --remove-orphans --build   # <-- --build ensures latest Dockerfile is used

                    rm -f app.tar
                    echo "Deployed ${{ env.ENV }} successfully in <70 seconds!"
                  EOF

            - name: Success
              if: success()
              run: |
                  echo "Deployed ${{ env.ENV }} environment"
                  echo "App running at → http://${{ env.HOST }}:3000"
