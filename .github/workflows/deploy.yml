name: Deploy (Dev & Prod)

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --------------------------------------------------
      # Decide environment (dev / prod)
      # --------------------------------------------------
      - name: Set environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "HOST=${{ secrets.HOST_SERVER_DEV }}" >> $GITHUB_ENV
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "HOST=${{ secrets.HOST_SERVER_PROD }}" >> $GITHUB_ENV
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}" >> $GITHUB_ENV
          fi

      - name: Validate env vars
        run: |
          echo "ENV=${ENV}"
          echo "HOST=${HOST}"
          if [ -z "$VITE_API_URL" ]; then
            echo "❌ VITE_API_URL is missing"
            exit 1
          fi

      # --------------------------------------------------
      # SSH setup
      # --------------------------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOST_SERVER_KEY_PAIR }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ env.HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # --------------------------------------------------
      # Cache npm + docker layers
      # --------------------------------------------------
      - name: Cache npm & docker
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            /tmp/.buildx-cache
          key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------
      # Build Docker image (VITE_API_URL injected here)
      # --------------------------------------------------
      - name: Build Docker image
        run: |
          docker buildx build \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --tag onrequestlab_reactjs:latest \
            --output type=docker,dest=app.tar \
            .

      # --------------------------------------------------
      # Transfer image to server
      # --------------------------------------------------
      - name: Transfer image
        run: |
          scp app.tar root@${{ env.HOST }}:~/onrequestlab_reactjs.tar

      # --------------------------------------------------
      # Deploy on server
      # --------------------------------------------------
      - name: Deploy on server
        run: |
          ssh root@${{ env.HOST }} << 'EOF'
            set -e

            docker load -i onrequestlab_reactjs.tar

            docker rm -f onrequestlab_reactjs || true

            docker run -d \
              -p 127.0.0.1:3000:3000 \
              --name onrequestlab_reactjs \
              onrequestlab_reactjs:latest

            rm -f onrequestlab_reactjs.tar
            echo "✅ Deployment complete"
          EOF

      - name: Done
        run: echo "🚀 Deployed to ${{ env.ENV }}"
