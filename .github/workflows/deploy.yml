name: Deploy (Dev & Prod)

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Determine environment
      - name: Set environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "HOST=${{ secrets.HOST_SERVER_DEV }}" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "HOST=${{ secrets.HOST_SERVER_PROD }}" >> $GITHUB_ENV
          fi

      # SSH setup
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOST_SERVER_KEY_PAIR }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ env.HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Cache npm + docker layers
      - name: Cache dependencies & buildx
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            /tmp/.buildx-cache
          key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Create env file (used at build time)
      - name: Create .env file
        run: |
          printf '%b' "${{ github.ref_name == 'main' && secrets.ENV_FILE_PROD || secrets.ENV_FILE_DEV }}" > .env

      # Build image & export as tar
      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --tag onrequestlab_reactjs:latest \
            --output type=docker,dest=app.tar \
            .

      # Copy image to server
      - name: Transfer image
        run: |
          scp app.tar root@${{ env.HOST }}:~/onrequestlab_reactjs.tar

      # Load & restart container
      - name: Deploy on server
        run: |
          ssh root@${{ env.HOST }} << 'EOF'
            set -e

            echo "Loading Docker image..."
            docker load -i onrequestlab_reactjs.tar

            echo "Stopping old container (if any)..."
            docker rm -f onrequestlab_reactjs || true

            echo "Starting new container..."
            docker run -d \
              -p 127.0.0.1:3000:3000 \
              --name onrequestlab_reactjs \
              onrequestlab_reactjs:latest

            rm -f onrequestlab_reactjs.tar
            echo "Deployment completed successfully"
          EOF

      - name: Success
        run: |
          echo "✅ Deployed ${{ env.ENV }} environment"
