name: Deploy

on:
    push:
        branches:
            - dev
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            # ── Detect environment from branch ─────────────────────
            - name: Set environment variables
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
                    echo "ENV=dev" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.DEV_HOST_SERVER }}" >> $GITHUB_ENV
                  else
                    echo "ENV=prod" >> $GITHUB_ENV
                    echo "HOST=${{ secrets.PROD_HOST_SERVER }}" >> $GITHUB_ENV
                  fi

            # ── Cache (same for both envs) ─────────────────────────
            - name: Cache node_modules + Docker layers
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      /tmp/.buildx-cache
                  key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & export image to tar
              run: |
                  docker buildx create --use
                  docker buildx build \
                    --cache-from=type=local,src=/tmp/.buildx-cache \
                    --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
                    --tag onrequestlab_reactjs:${{ env.ENV }} \
                    --output type=docker,dest=app.tar \
                    .

            # ── Transfer image + .env (dynamic host & env file) ─────
            - name: Transfer image to server
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sudo apt-get update && sudo apt-get install -y sshpass

                  sshpass -p "$HOST_PASSWORD" scp -o StrictHostKeyChecking=no \
                    app.tar "${{ secrets.HOST_USER }}"@${{ env.HOST }}:~/onrequestlab_reactjs.tar

            # ── Load image & restart on server ─────────────────────
            - name: Load image & restart on server
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sshpass -p "$HOST_PASSWORD" ssh -o StrictHostKeyChecking=no \
                    "${{ secrets.HOST_USER }}"@${{ env.HOST }} << 'EOF'
                    set -e
                    cd ~/onrequestlab_reactjs

                    docker load < ../onrequestlab_reactjs.tar
                    docker compose down
                    docker compose up -d

                    rm -f ../onrequestlab_reactjs.tar
                    echo "Deployed ${{ env.ENV }} successfully!"
                  EOF

            # ── Final message ───────────────────────────────────────
            - name: Success
              if: success()
              run: |
                  echo "Deployed ${{ env.ENV }} environment"
                  echo "Live at: http://${{ env.HOST }}:3000"
