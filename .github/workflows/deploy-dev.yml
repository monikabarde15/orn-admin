name: Deploy to Dev

on:
    push:
        branches:
            - dev

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Cache node_modules + Docker layers
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.npm
                      /tmp/.buildx-cache
                  key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-build-${{ hashFiles('package-lock.json') }}-

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & export image to tar (no registry!)
              run: |
                  docker buildx create --use
                  docker buildx build \
                    --cache-from=type=local,src=/tmp/.buildx-cache \
                    --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
                    --tag onrequestlab_reactjs:latest \
                    --output type=docker,dest=app.tar \
                    .

            - name: Transfer image + .env to EC2 (tiny & fast)
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sudo apt-get update && sudo apt-get install -y sshpass
                  sshpass -p "$HOST_PASSWORD" scp -o StrictHostKeyChecking=no app.tar "${{ secrets.HOST_USER }}"@"${{ secrets.DEV_HOST_SERVER }}":~/onrequestlab_reactjs.tar

            - name: Load image & restart
              env:
                  HOST_PASSWORD: ${{ secrets.HOST_PASSWORD }}
              run: |
                  sshpass -p "$HOST_PASSWORD" ssh -o StrictHostKeyChecking=no "${{ secrets.HOST_USER }}"@"${{ secrets.DEV_HOST_SERVER }}" << 'EOF'
                    set -e
                    cd ~/onrequestlab_reactjs

                    docker load < ../onrequestlab_reactjs.tar
                    docker compose down
                    docker compose up -d

                    rm -f ../onrequestlab_reactjs.tar
                    echo "Deployed successfully!"
                  EOF

            - name: Success message
              if: success()
              run: echo "Deployed to http://${{ secrets.DEV_HOST_SERVER }}:3000"
